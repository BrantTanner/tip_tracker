<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TipTracker</title>
    <link rel="icon" href="images/dollarSignFavicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <section id="authControls">
        <h1 id="pageTitle">Tip Tracker</h1>

        <div id="loggedOutActions">
            <button id="googleSignInBtn" type="button">Sign In</button>
        </div>

        <div id="loggedInActions" style="display: none;">
            <p id="currentUser"></p>
            <button id="logout" type="button">Logout</button>
        </div>
    </section>

    <div id="authModal" style="display: none;">
        <div class="modalCard">
            <h2>Account</h2>
            <label>Email: <input type="email" id="authEmail" autocomplete="email"></label>
            <label>Password: <input type="password" id="authPassword" autocomplete="current-password"></label>
            <button id="modalLogin" type="button">Login</button>
            <button id="modalSignup" type="button">Sign Up</button>
            <button id="googleLogin" type="button">Sign In With Google</button>
            <button id="closeAuthModal" type="button">Close</button>
        </div>
    </div>

    <section id="appContent">
        <div id="tipModal" style="display: none;">
            <div class="modalCard">
                <h2>Add Tour</h2>
                <form id="tipForm">
                    <label>Tips: <input type="number" name="tips" required></label>
                    <label>Guests: <input type="number" name="guests" required></label>
                    <label>Tour: <input type="text" name="tour" required></label>
                    <label>Cruise Ship: <input type="text" name="ship" required></label>
                    <button type="submit">Submit</button>
                </form>
                <button id="closeTipModal" type="button">Close</button>
            </div>
        </div>

        <p id="loggedOutPrompt" hidden>log in or signup to start tracking!</p>

        <section id="graphSection" aria-label="Tips and guests line chart" hidden>
            <div class="summaryGroup">
                <h3 class="summaryGroupTitle">Totals</h3>
                <div id="summaryBoxesContainer" class="summaryBoxesContainer"></div>
            </div>
            <div class="summaryGroup">
                <h3 class="summaryGroupTitle">Highest Amounts (In One Day)</h3>
                <div id="highestSummaryBoxesContainer" class="summaryBoxesContainer"></div>
            </div>
            <div class="summaryGroup">
                <h3 class="summaryGroupTitle">Averages</h3>
                <div id="averageSummaryBoxesContainer" class="summaryBoxesContainer"></div>
            </div>
            <div id="tourShipSummaryGroup" class="summaryGroup" hidden>
                <h3 class="summaryGroupTitle">Tour &amp; Ship Stats</h3>
                <div id="tourShipSummaryBoxesContainer" class="summaryBoxesContainer"></div>
            </div>
            <div class="chartCard">
                <div class="chartToolbar" aria-label="Chart timeframe controls">
                    <div class="chartSortButtons" role="group" aria-label="Group chart by timeframe">
                        <button id="chartByDayBtn" class="chartSortBtn active" type="button" data-granularity="day" aria-pressed="true">Days</button>
                        <button id="chartByWeekBtn" class="chartSortBtn" type="button" data-granularity="week" aria-pressed="false">Weeks</button>
                        <button id="chartByMonthBtn" class="chartSortBtn" type="button" data-granularity="month" aria-pressed="false">Months</button>
                    </div>
                </div>
                <div class="chartCanvasWrap">
                    <canvas id="tipsGuestsChart"></canvas>
                </div>
            </div>
        </section>

        <div id="tableControls" class="tableControls">
            
            <div class="actionGroup">
                <button id="openTipModal" class="addTipBtn" type="button">Add Tour</button>
                <button id="removeTipsBtn" class="removeTipsBtn" type="button">Remove</button>
            </div>
            
            <div class="controlGroup"> 
                <button id="filterBtn" class="filterBtn" type="button">
                    <svg class="filterIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                    </svg>
                    Filter
                </button>
                <div id="filterOptions" class="filterOptions">
                    <select id="sortBy">
                        <option value="created_at">Date</option>
                        <option value="tips">Tips</option>
                        <option value="guests">Guests</option>
                        <option value="tour">Tour</option>
                        <option value="ship">Cruise Ship</option>
                    </select>
                </div>

                <button id="orderBtn" class="orderBtn" type="button">
                    <svg class="orderIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M3 12h18M3 18h18"></path>
                    </svg>
                    Order
                </button>
                <div id="orderOptions" class="orderOptions">
                    <select id="sortDirectionSelect">
                        <option value="desc">Highest to Lowest</option>
                        <option value="asc">Lowest to Highest</option>
                    </select>
                </div>
            </div>
            
        </div>
        
        <p id="status"></p>
        <div id="dataDisplay"></div>
    </section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
